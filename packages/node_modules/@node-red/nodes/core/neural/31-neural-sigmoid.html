<script type="text/html" data-template-name="neural-sigmoid">
    <div class="form-row">
        <p style="margin:4px 0; font-size:12px; color:var(--red-ui-secondary-text-color)">
            <b>Sigmoid</b> — squashes values to (0, 1): 1 / (1 + e<sup>-x</sup>)
        </p>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('neural-sigmoid', {
        category: 'neural',
        color: '#D4537E',
        defaults: {
            name: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-sigmoid.svg",
        label: function() {
            return this.name || "Sigmoid";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        onpaletteadd: function() { addNeuralMonitor(); },
        onpaletteremove: function() { removeNeuralMonitor(); }
    });
</script>

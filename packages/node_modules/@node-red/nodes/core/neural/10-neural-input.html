<script type="text/html" data-template-name="neural-input">
    <div class="form-row">
        <label for="node-input-count"><i class="fa fa-ellipsis-h"></i> Neurons</label>
        <input type="number" id="node-input-count" style="width:70px" min="1" max="32">
    </div>
    <div class="form-row">
        <label for="node-input-values"><i class="fa fa-sliders"></i> Values</label>
        <input type="text" id="node-input-values" style="width:70%" placeholder="e.g. 0.5, 1.0, 0.0">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    (function() {
        var neuralToolbar = null;
        var neuralStepIndex = 0;
        var neuralInputNodes = [];

        function getNeuralInputNodes() {
            neuralInputNodes = [];
            RED.nodes.eachNode(function(node) {
                if (node.type === "neural-input") {
                    neuralInputNodes.push(node);
                }
            });
            return neuralInputNodes;
        }

        function triggerNode(node, hold) {
            var data = hold ? { neural: { hold: true } } : {};
            $.ajax({
                url: "neural-inject/" + node.id,
                type: "POST",
                contentType: "application/json; charset=utf-8",
                data: JSON.stringify(data),
                success: function() {
                    var label = node.name || node.type;
                    RED.notify(hold ? "Stepped: " + label : "Ran: " + label, { type: "success", id: "neural-inject", timeout: 1000 });
                },
                error: function(jqXHR) {
                    if (jqXHR.status === 404) {
                        RED.notify("Deploy the flow first", "warning");
                    }
                }
            });
        }

        function triggerAllInputs(hold) {
            getNeuralInputNodes();
            if (neuralInputNodes.length === 0) {
                RED.notify("No neural-input nodes on workspace", "warning");
                return;
            }
            neuralInputNodes.forEach(function(node) {
                triggerNode(node, hold);
            });
        }

        function runNetwork() {
            var selection = RED.view.selection();
            if (selection.nodes && selection.nodes.length > 0) {
                selection.nodes.forEach(function(node) {
                    if (node.type.indexOf("neural-") === 0) {
                        triggerNode(node, false);
                    }
                });
            } else {
                triggerAllInputs(false);
            }
        }

        function stepOne() {
            getNeuralInputNodes();
            if (neuralInputNodes.length === 0) {
                RED.notify("No neural-input nodes on workspace", "warning");
                return;
            }
            triggerNode(neuralInputNodes[neuralStepIndex % neuralInputNodes.length], true);
            neuralStepIndex++;
        }

        function advanceAll() {
            $.ajax({
                url: "neural-advance",
                type: "POST",
                contentType: "application/json; charset=utf-8",
                success: function() {
                    RED.notify("Advanced one step", { type: "success", id: "neural-advance", timeout: 1000 });
                }
            });
        }

        function addToolbar() {
            if (neuralToolbar) return;
            var sep = $('<li style="border-left:1px solid var(--red-ui-header-button-border);height:22px;margin:0 6px;"></li>');
            var runBtn = $('<li><a id="red-ui-header-button-neural-run" class="button" href="#" title="Run: trigger selected node or all inputs"><i class="fa fa-play"></i><span style="font-size:12px;margin-left:3px;">Run</span></a></li>');
            var stepBtn = $('<li><a id="red-ui-header-button-neural-step" class="button" href="#" title="Step: inject into next input node with hold"><i class="fa fa-step-forward"></i><span style="font-size:12px;margin-left:3px;">Step</span></a></li>');
            var advBtn = $('<li><a id="red-ui-header-button-neural-advance" class="button" href="#" title="Advance: release held nodes"><i class="fa fa-forward"></i><span style="font-size:12px;margin-left:3px;">Advance</span></a></li>');

            neuralToolbar = $([sep[0], runBtn[0], stepBtn[0], advBtn[0]]);

            runBtn.on("click", function(evt) {
                evt.preventDefault();
                runNetwork();
            });
            stepBtn.on("click", function(evt) {
                evt.preventDefault();
                stepOne();
            });
            advBtn.on("click", function(evt) {
                evt.preventDefault();
                advanceAll();
            });

            neuralToolbar.appendTo(".red-ui-header-toolbar");
        }

        function removeToolbar() {
            if (neuralToolbar) {
                neuralToolbar.remove();
                neuralToolbar = null;
            }
        }

        RED.nodes.registerType('neural-input', {
            category: 'neural',
            color: '#1D9E75',
            defaults: {
                name: { value: "" },
                count: { value: 3, required: true, validate: function(v) { return v > 0 && v <= 32; } },
                values: { value: "0.5, 0.5, 0.5" }
            },
            inputs: 1,
            outputs: 1,
            icon: "neural-input.svg",
            button: {
                onclick: function() {
                    triggerNode(this, false);
                }
            },
            label: function() {
                return this.name || "Input " + this.count + "n";
            },
            labelStyle: function() {
                return this.name ? "node_label_italic" : "";
            },
            onpaletteadd: function() {
                addToolbar();
                addNeuralMonitor();
            },
            onpaletteremove: function() {
                removeToolbar();
                removeNeuralMonitor();
            },
            oneditprepare: function() {
                var v = this.values;
                if (Array.isArray(v)) {
                    v = v.join(", ");
                }
                $("#node-input-values").val(v);
            },
            oneditsave: function() {
                var raw = $("#node-input-values").val();
                this.values = raw.split(",").map(function(v) { return parseFloat(v.trim()) || 0; });
            }
        });
    })();
</script>

<script type="text/javascript">
    // Shared neural monitor sidebar - available globally for all neural node types
    (function() {
        if (window.__neuralMonitorInited) return;
        window.__neuralMonitorInited = true;

        var pollTimer = null;
        var sidebarTab = null;

        var NODE_COLORS = {
            "neural-input": "#1D9E75",
            "neural-neuron": "#378ADD",
            "neural-relu": "#E8A838",
            "neural-sigmoid": "#E84A8A",
            "neural-softmax": "#E8A838",
            "neural-dropout": "#888888",
            "neural-flatten": "#A855F7",
            "neural-conv2d": "#A855F7",
            "neural-output": "#E24B4A"
        };

        function drawBarChart(canvas, values, color) {
            var ctx = canvas.getContext("2d");
            var w = canvas.width;
            var h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            if (!values || values.length === 0) return;

            var maxVal = Math.max.apply(null, values.map(Math.abs));
            if (maxVal === 0) maxVal = 1;
            var barW = Math.max(2, (w - values.length - 1) / values.length);
            var gap = 1;

            values.forEach(function(v, i) {
                var barH = Math.abs(v) / maxVal * (h - 4);
                var x = i * (barW + gap);
                var y = v >= 0 ? h - 2 - barH : h / 2;
                ctx.fillStyle = color || "#70b8ff";
                ctx.fillRect(x, y, barW, barH);
            });
        }

        function getNodeTypeColor(type) {
            return NODE_COLORS[type] || "#888";
        }

        function renderSidebar() {
            if (!sidebarTab) return;
            var container = sidebarTab.content;
            $.ajax({
                url: "neural-state",
                type: "GET",
                dataType: "json",
                success: function(state) {
                    container.empty();
                    var ids = Object.keys(state);
                    if (ids.length === 0) {
                        container.append(
                            '<div style="padding:20px;text-align:center;color:#888;font-size:13px;">' +
                            'Add neural nodes and deploy<br>to see outputs here' +
                            '</div>'
                        );
                        return;
                    }

                    var typeOrder = ["neural-input","neural-neuron","neural-relu","neural-sigmoid","neural-softmax","neural-dropout","neural-flatten","neural-conv2d","neural-output"];
                    typeOrder.forEach(function(type) {
                        var nodesForType = [];
                        ids.forEach(function(id) {
                            if (state[id].type === type) nodesForType.push({ id: id, data: state[id] });
                        });
                        if (nodesForType.length === 0) return;

                        nodesForType.forEach(function(item) {
                            var s = item.data;
                            var color = getNodeTypeColor(type);
                            var typeLabel = type.replace("neural-", "");
                            var statusColor = s.status === "held" ? "#e8a838" : (s.active ? "#4caf50" : "#555");
                            var statusIcon = s.status === "held" ? "fa-pause" : (s.active ? "fa-bolt" : "fa-circle-o");

                            var card = $('<div style="background:#1a1f2e;border:1px solid #2d333b;border-radius:6px;margin:6px 8px;padding:10px;font-size:12px;"></div>');
                            var header = $('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"></div>').appendTo(card);
                            $('<span style="display:flex;align-items:center;gap:6px;"><i class="fa ' + statusIcon + '" style="color:' + statusColor + ';width:12px;"></i><strong style="color:' + color + ';">' + (s.name || typeLabel) + '</strong><span style="color:#666;font-size:11px;">' + typeLabel + '</span></span>').appendTo(header);

                            if (s.values && s.values.length > 0) {
                                var canvas = $('<canvas width="200" height="32" style="width:100%;height:32px;border-radius:3px;"></canvas>').appendTo(header);
                                drawBarChart(canvas[0], s.values, color);
                            }

                            if (s.connections && s.connections.length > 0) {
                                $('<div style="color:#555;font-size:11px;margin-top:4px;border-top:1px solid #2d333b;padding-top:4px;">→ ' + s.connections.map(function(c) { return c.name || c.type.replace("neural-",""); }).join(", ") + '</div>').appendTo(card);
                            }

                            var meta = [];
                            if (s.shape && s.shape.length > 0) meta.push("[" + s.shape.join(",") + "]");
                            if (s.timestamp) meta.push(new Date(s.timestamp).toLocaleTimeString());
                            if (meta.length > 0) {
                                $('<div style="color:#444;font-size:10px;margin-top:4px;">' + meta.join(" · ") + '</div>').appendTo(card);
                            }

                            container.append(card);
                        });
                    });
                },
                error: function() {
                    container.html('<div style="padding:20px;text-align:center;color:#888;">Disconnected</div>');
                }
            });
        }

        window.addNeuralMonitor = function() {
            if (sidebarTab) return;

            var sidebarContent = $('<div style="overflow-y:auto;height:100%;"></div>');
            var toolbar = $('<div style="display:flex;gap:4px;padding:4px 8px;border-bottom:1px solid #2d333b;"></div>');
            $('<button class="red-ui-button red-ui-button-small" style="flex:1;"><i class="fa fa-refresh"></i> Reset</button>').appendTo(toolbar).on("click", function() {
                $.ajax({ url: "neural-reset", type: "POST" });
                renderSidebar();
            });
            $('<button class="red-ui-button red-ui-button-small" style="flex:1;"><i class="fa fa-sitemap"></i> Refresh</button>').appendTo(toolbar).on("click", function() {
                renderSidebar();
            });
            sidebarContent.append(toolbar);

            sidebarTab = {
                id: "neural-monitor",
                label: "Neural",
                name: "Neural Network",
                content: sidebarContent,
                iconClass: "fa fa-cogs",
                onchange: function() {
                    if (pollTimer) clearInterval(pollTimer);
                    pollTimer = setInterval(renderSidebar, 300);
                    renderSidebar();
                }
            };
            RED.sidebar.addTab(sidebarTab);
        };

        window.removeNeuralMonitor = function() {
            var hasOtherNeural = false;
            RED.nodes.eachNode(function(node) {
                if (node.type && node.type.indexOf("neural-") === 0) {
                    hasOtherNeural = true;
                }
            });
            if (hasOtherNeural) return;

            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
            if (sidebarTab) {
                RED.sidebar.removeTab("neural-monitor");
                sidebarTab = null;
            }
        };
    })();
</script>

<script type="text/html" data-template-name="neural-output">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    function triggerOutputNode(node) {
        $.ajax({
            url: "neural-inject/" + node.id,
            type: "POST",
            contentType: "application/json; charset=utf-8",
            data: JSON.stringify({}),
            error: function(jqXHR) {
                if (jqXHR.status === 404) {
                    RED.notify("Deploy the flow first", "warning");
                }
            }
        });
    }

    RED.nodes.registerType('neural-output', {
        category: 'neural',
        color: '#E24B4A',
        defaults: {
            name: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-output.svg",
        align: "right",
        button: {
            onclick: function() {
                triggerOutputNode(this);
            }
        },
        label: function() {
            return this.name || "Output";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        onpaletteadd: function() { addNeuralMonitor(); },
        onpaletteremove: function() { removeNeuralMonitor(); }
    });
</script>

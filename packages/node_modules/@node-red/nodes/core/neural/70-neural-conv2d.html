<script type="text/html" data-template-name="neural-conv2d">
    <div class="form-row">
        <label for="node-input-filters"><i class="fa fa-th"></i> Filters</label>
        <input type="number" id="node-input-filters" style="width:70px" min="1" max="64" value="4">
    </div>
    <div class="form-row">
        <label for="node-input-kernelSize"><i class="fa fa-square-o"></i> Kernel size</label>
        <input type="number" id="node-input-kernelSize" style="width:70px" min="1" max="7" value="3">
    </div>
    <div class="form-row">
        <label for="node-input-activation"><i class="fa fa-line-chart"></i> Activation</label>
        <select id="node-input-activation" style="width:auto">
            <option value="none">None (linear)</option>
            <option value="relu">ReLU</option>
            <option value="sigmoid">Sigmoid</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('neural-conv2d', {
        category: 'neural',
        color: '#7F77DD',
        defaults: {
            name: { value: "" },
            filters: { value: 4, required: true },
            kernelSize: { value: 3, required: true },
            activation: { value: "none" }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-neuron.svg",
        label: function() {
            var suffix = this.activation !== "none" ? " (" + this.activation + ")" : "";
            return this.name || "Conv2D " + this.filters + "x" + this.kernelSize + suffix;
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        onpaletteadd: function() { addNeuralMonitor(); },
        onpaletteremove: function() { removeNeuralMonitor(); }
    });
</script>

<script type="text/html" data-template-name="neural-dropout">
    <div class="form-row">
        <label for="node-input-rate"><i class="fa fa-percent"></i> Drop rate</label>
        <input type="number" id="node-input-rate" style="width:70px" min="0" max="0.99" step="0.05" value="0.5">
    </div>
    <div class="form-row">
        <label for="node-input-training"><i class="fa fa-graduation-cap"></i> Training mode</label>
        <input type="checkbox" id="node-input-training" style="display:inline-block; width:22px;" checked>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('neural-dropout', {
        category: 'neural',
        color: '#888780',
        defaults: {
            name: { value: "" },
            rate: { value: 0.5, required: true, validate: function(v) { return v >= 0 && v <= 0.99; } },
            training: { value: true }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-dropout.svg",
        label: function() {
            var suffix = this.training ? " (train)" : " (infer)";
            return this.name || "Dropout " + (this.rate * 100).toFixed(0) + "%" + suffix;
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        onpaletteadd: function() { addNeuralMonitor(); },
        onpaletteremove: function() { removeNeuralMonitor(); },
        oneditprepare: function() {
            $("#node-input-training").prop('checked', this.training);
        },
        oneditsave: function() {
            this.training = $("#node-input-training").is(':checked');
        }
    });
</script>

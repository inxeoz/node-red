<script type="text/html" data-template-name="neural-softmax">
    <div class="form-row">
        <p style="margin:4px 0; font-size:12px; color:var(--red-ui-secondary-text-color)">
            <b>Softmax</b> — normalized exponential: converts logits to probabilities (sum = 1)
        </p>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>

<script type="text/javascript">
    RED.nodes.registerType('neural-softmax', {
        category: 'neural',
        color: '#BA7517',
        defaults: {
            name: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-softmax.svg",
        label: function() {
            return this.name || "Softmax";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        onpaletteadd: function() { addNeuralMonitor(); },
        onpaletteremove: function() { removeNeuralMonitor(); }
    });
</script>

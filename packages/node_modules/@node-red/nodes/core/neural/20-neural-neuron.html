<script type="text/html" data-template-name="neural-neuron">
    <div class="form-row">
        <label for="node-input-neurons"><i class="fa fa-ellipsis-h"></i> Neurons</label>
        <input type="number" id="node-input-neurons" style="width:70px" min="1" max="128">
    </div>
    <div class="form-row">
        <label for="node-input-activation"><i class="fa fa-line-chart"></i> Activation</label>
        <select id="node-input-activation" style="width:auto">
            <option value="none">None (linear)</option>
            <option value="relu">ReLU</option>
            <option value="sigmoid">Sigmoid</option>
            <option value="tanh">Tanh</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" style="width:70%">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('neural-neuron', {
        category: 'neural',
        color: '#378ADD',
        defaults: {
            name: { value: "" },
            neurons: { value: 4, required: true, validate: function(v) { return v > 0 && v <= 128; } },
            activation: { value: "none" }
        },
        inputs: 1,
        outputs: 1,
        icon: "neural-neuron.svg",
        label: function() {
            var suffix = this.activation !== "none" ? " (" + this.activation + ")" : "";
            return this.name || "Dense " + this.neurons + "n" + suffix;
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        }
    });
</script>
